<button class="chat-toggle" (click)="openChat()">
  <i class="fas fa-comments"></i> Chat
</button>

<div class="chat-window" *ngIf="isOpen">
  <div class="chat-header">
    <h4>{{ otherUserName }}</h4>
    <button class="btn-close" (click)="closeChat()">&times;</button>
  </div>
  <div class="chat-messages">
    <div *ngFor="let msg of messages" class="message" [class.sent]="msg.idUserSender === currentUserId">
      <p>{{ msg.message }}</p>
      <span>{{ msg.createDate | date:'shortTime' }}</span>
    </div>
    <div *ngIf="messages.length === 0" class="no-messages">
      No messages yet
    </div>
  </div>
  <div class="chat-input">
    <input [(ngModel)]="newMessage" placeholder="Type a message..." (keyup.enter)="sendMessage()" />
    <button (click)="sendMessage()"><i class="fas fa-paper-plane"></i></button>
  </div>
</div>
