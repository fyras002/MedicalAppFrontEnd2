<div class="dashboard-container">
  <aside class="sidebar">
    <div class="sidebar-header"><h2>MedicalApp</h2></div>
    <nav class="sidebar-nav">
      <a routerLink="/doctor/dashboard">Dashboard</a>
      <a routerLink="/doctor/appointments">My Appointments</a>
      <a routerLink="/doctor/patients">My Patients</a>
      <a routerLink="/doctor/consultations" routerLinkActive="active">Consultations</a>
      <a routerLink="/doctor/medical-records">Medical Records</a>
    </nav>
    <div class="sidebar-footer"><button (click)="logout()">Logout</button></div>
  </aside>

  <main class="main-content">
    <header class="top-bar">
      <h1>Consultations</h1>
      <button class="btn-add" (click)="showForm = !showForm">+ New Consultation</button>
    </header>

    <div class="content-area">
      <div class="form-card" *ngIf="showForm">
        <h3>New Consultation</h3>
        <div class="form-group">
          <label>Patient</label>
          <select [(ngModel)]="newConsultation.idPatient">
            <option value="">Select Patient</option>
            <option *ngFor="let p of patients" [value]="p.idPatient">{{ p.firstname }} {{ p.lastname }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>Symptoms</label>
          <input [(ngModel)]="newConsultation.symptomsList" placeholder="e.g. Fever, headache" />
        </div>
        <div class="form-group">
          <label>Tests</label>
          <input [(ngModel)]="newConsultation.tests" placeholder="e.g. Blood pressure" />
        </div>
        <div class="form-group">
          <label>Medications</label>
          <input [(ngModel)]="newConsultation.medicationsList" placeholder="e.g. Paracetamol" />
        </div>
        <div class="form-group">
          <label>Notes</label>
          <textarea [(ngModel)]="newConsultation.notes" placeholder="Doctor's notes..."></textarea>
        </div>
        <button class="btn-save" (click)="createConsultation()">Save Consultation</button>
      </div>

      <table class="consultation-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Patient</th>
            <th>Symptoms</th>
            <th>Medications</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let c of consultations">
            <td>{{ c.myDateTime | date:'mediumDate' }}</td>
            <td>{{ c.patientFullName }}</td>
            <td>{{ c.symptomsList }}</td>
            <td>{{ c.medicationsList }}</td>
            <td>{{ c.notes }}</td>
          </tr>
          <tr *ngIf="consultations.length === 0">
            <td colspan="5" class="no-data">No consultations yet</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
</div>
