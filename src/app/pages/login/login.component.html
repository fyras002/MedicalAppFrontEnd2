<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Bricolage+Grotesque:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<div class="login-container" [class.dark-mode]="isDarkMode">
  <div class="login-card">
    <button class="dark-mode-toggle" (click)="toggleDarkMode()" [title]="isDarkMode ? 'Light Mode' : 'Dark Mode'">
      <i class="fas" [class.fa-moon]="!isDarkMode" [class.fa-sun]="isDarkMode"></i>
    </button>

    <div class="logo">
      <div class="brand-logo">
        <i class="fas fa-plus-circle brand-icon"></i>
        <h1>MedicalApp</h1>
      </div>
      <p>Healthcare Management System</p>
    </div>

    <div class="form-group">
      <label>Username</label>
      <div class="input-wrapper">
        <i class="fas fa-user"></i>
        <input type="text" [(ngModel)]="username" placeholder="Enter your username" />
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrapper">
        <i class="fas fa-lock"></i>
        <input type="password" [(ngModel)]="password" placeholder="Enter your password" />
      </div>
    </div>

    <button class="btn-login" (click)="login()">
      <i class="fas fa-sign-in-alt"></i> Sign In
    </button>

    <p class="register-link">
      Don't have an account? <a routerLink="/register">Create Account</a>
    </p>
  </div>
</div>
