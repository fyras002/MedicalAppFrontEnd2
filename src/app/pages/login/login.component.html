<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<div class="login-container">
  <div class="login-card">
    <div class="logo">
      <h1>MedicalApp</h1>
      <p>Healthcare Management System</p>
    </div>

    <div class="form-group">
      <label>Username</label>
      <div class="input-wrapper">
        <i class="fas fa-user"></i>
        <input type="text" [(ngModel)]="username" placeholder="Enter your username" />
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrapper">
        <i class="fas fa-lock"></i>
        <input type="password" [(ngModel)]="password" placeholder="Enter your password" />
      </div>
    </div>

    <button class="btn-login" (click)="login()">
      <i class="fas fa-sign-in-alt"></i> Sign In
    </button>

    <p class="register-link">
      Don't have an account? <a routerLink="/register">Create Account</a>
    </p>
  </div>
</div>
