<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<div class="dashboard-container">
  <aside class="sidebar">
    <div class="sidebar-header"><h2>MedicalApp</h2></div>
    <nav class="sidebar-nav">
      <a routerLink="/admin/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        <i class="fas fa-chart-pie"></i> Dashboard
      </a>
      <a routerLink="/admin/users" routerLinkActive="active">
        <i class="fas fa-users"></i> Users
      </a>
      <a routerLink="/admin/doctors" routerLinkActive="active">
        <i class="fas fa-user-md"></i> Doctors
      </a>
      <a routerLink="/admin/specialities" routerLinkActive="active">
        <i class="fas fa-stethoscope"></i> Specialities
      </a>
      <a routerLink="/admin/patients" routerLinkActive="active">
        <i class="fas fa-heart"></i> Patients
      </a>
      <a routerLink="/admin/appointments" routerLinkActive="active">
        <i class="fas fa-calendar-alt"></i> Appointments
      </a>
      <a routerLink="/admin/medical-records" routerLinkActive="active">
        <i class="fas fa-file-medical-alt"></i> Medical Records
      </a>
    </nav>
    <div class="sidebar-footer"><button (click)="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button></div>
  </aside>
  <main class="main-content">
    <header class="top-bar"><h1>All Users</h1></header>
    <div class="content-area">
      <table class="user-table">
        <thead><tr><th>ID</th><th>Username</th><th>Email</th><th>Name</th><th>Role</th><th>Actions</th></tr></thead>
        <tbody>
          <tr *ngFor="let user of users">
            <td>{{ user.id }}</td>
            <td>{{ user.username }}</td>
            <td>{{ user.email }}</td>
            <td>{{ user.firstname }} {{ user.lastname }}</td>
            <td>{{ getRoleName(user.role) }}</td>
            <td><button class="btn-delete" (click)="deleteUser(user.id)">Delete</button></td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
</div>
