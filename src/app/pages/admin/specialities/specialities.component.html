<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<div class="dashboard-container">
  <aside class="sidebar">
    <div class="sidebar-header"><h2>MedicalApp</h2></div>
    <nav class="sidebar-nav">
      <a routerLink="/admin/dashboard"><i class="fas fa-chart-pie"></i> Dashboard</a>
      <a routerLink="/admin/users"><i class="fas fa-users"></i> Users</a>
      <a routerLink="/admin/doctors"><i class="fas fa-user-md"></i> Doctors</a>
      <a routerLink="/admin/specialities" routerLinkActive="active"><i class="fas fa-stethoscope"></i> Specialities</a>
      <a routerLink="/admin/patients"><i class="fas fa-heart"></i> Patients</a>
      <a routerLink="/admin/appointments"><i class="fas fa-calendar-alt"></i> Appointments</a>
      <a routerLink="/admin/medical-records"><i class="fas fa-file-medical-alt"></i> Medical Records</a>
    </nav>
    <div class="sidebar-footer"><button (click)="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button></div>
  </aside>

  <main class="main-content">
    <header class="top-bar">
      <h1>Specialities</h1>
      <button (click)="showForm = !showForm"><i class="fas fa-plus"></i> Add Speciality</button>
    </header>

    <div class="content-area">
      <div class="form-card" *ngIf="showForm">
        <h3>Add Speciality</h3>
        <select [(ngModel)]="newSpeciality.specialityName">
          <option [ngValue]="null">Select Speciality</option>
          <option [ngValue]="1">Cardiology</option>
          <option [ngValue]="2">Dermatology</option>
          <option [ngValue]="3">Neurology</option>
          <option [ngValue]="4">Pediatrics</option>
          <option [ngValue]="5">Radiology</option>
          <option [ngValue]="6">General Medicine</option>
          <option [ngValue]="7">Orthopedics</option>
          <option [ngValue]="8">Psychiatry</option>
        </select>
        <input [(ngModel)]="newSpeciality.description" placeholder="Description" />
        <button (click)="createSpeciality()">Create Speciality</button>
      </div>

      <div class="speciality-grid">
        <div class="speciality-card" *ngFor="let s of specialities">
          <div class="speciality-icon"><i class="fas fa-stethoscope"></i></div>
          <h3>{{ s.specialityName }}</h3>
          <p>{{ s.description || 'No description' }}</p>
          <p><strong>Doctors:</strong> {{ s.doctors?.length || 0 }}</p>
          <button (click)="deleteSpeciality(s.id)">Delete</button>
        </div>
      </div>
    </div>
  </main>
</div>
