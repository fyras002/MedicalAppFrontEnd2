<div class="dashboard-container">
  <aside class="sidebar">
    <div class="sidebar-header"><h2>MedicalApp</h2></div>
    <nav class="sidebar-nav">
      <a routerLink="/patient/dashboard">Dashboard</a>
      <a routerLink="/patient/appointments" routerLinkActive="active">My Appointments</a>
      <a routerLink="/patient/medical-records">Medical Records</a>
    </nav>
    <div class="sidebar-footer"><button (click)="logout()">Logout</button></div>
  </aside>

  <main class="main-content">
    <header class="top-bar">
      <h1>My Appointments</h1>
      <button class="btn-book" (click)="showBookForm = !showBookForm; loadDoctors()">+ Book Appointment</button>
    </header>

    <div class="content-area">
      <div class="book-form" *ngIf="showBookForm">
        <h3>Book New Appointment</h3>
        <div class="form-group"><label>Doctor</label><select [(ngModel)]="newAppointment.idDoctor"><option value="">Select Doctor</option><option *ngFor="let d of doctors" [value]="d.id">{{ d.fullName }} - {{ d.specialityName }}</option></select></div>
        <div class="form-group"><label>Date & Time</label><input type="datetime-local" [(ngModel)]="newAppointment.dateTimeAppointment" /></div>
        <div class="form-group"><label>Symptoms</label><input [(ngModel)]="newAppointment.symptoms" placeholder="Describe your symptoms" /></div>
        <div class="form-group"><label>Reason</label><input [(ngModel)]="newAppointment.reason" placeholder="Reason for visit" /></div>
        <button class="btn-save" (click)="bookAppointment()">Confirm Booking</button>
      </div>

      <table class="appointment-table">
        <thead><tr><th>Date</th><th>Time</th><th>Doctor</th><th>Reason</th></tr></thead>
        <tbody>
          <tr *ngFor="let app of appointments">
            <td>{{ app.dateTimeAppointment | date:'mediumDate' }}</td>
            <td>{{ app.dateTimeAppointment | date:'shortTime' }}</td>
            <td>{{ app.doctorFullName }}</td>
            <td>{{ app.reason }}</td>
          </tr>
          <tr *ngIf="appointments.length === 0"><td colspan="4" class="no-data">No appointments found</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>
