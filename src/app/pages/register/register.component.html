<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Bricolage+Grotesque:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<div class="register-container" [class.dark-mode]="isDarkMode">
  <div class="register-card">
    <button class="dark-mode-toggle" (click)="toggleDarkMode()" [title]="isDarkMode ? 'Light Mode' : 'Dark Mode'">
      <i class="fas" [class.fa-moon]="!isDarkMode" [class.fa-sun]="isDarkMode"></i>
    </button>

    <div class="logo">
      <div class="brand-logo">
        <i class="fas fa-plus-circle brand-icon"></i>
        <h1>MedicalApp</h1>
      </div>
      <p>Create Your Account</p>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>First Name</label>
        <div class="input-wrapper">
          <i class="fas fa-user"></i>
          <input type="text" [(ngModel)]="user.firstname" placeholder="Enter first name" />
        </div>
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <div class="input-wrapper">
          <i class="fas fa-user"></i>
          <input type="text" [(ngModel)]="user.lastname" placeholder="Enter last name" />
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>Username</label>
      <div class="input-wrapper">
        <i class="fas fa-at"></i>
        <input type="text" [(ngModel)]="user.username" placeholder="Choose a username" />
      </div>
    </div>

    <div class="form-group">
      <label>Email</label>
      <div class="input-wrapper">
        <i class="fas fa-envelope"></i>
        <input type="email" [(ngModel)]="user.email" placeholder="Enter your email" />
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrapper">
        <i class="fas fa-lock"></i>
        <input type="password" [(ngModel)]="user.password" placeholder="Create password" />
      </div>
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <div class="input-wrapper">
        <i class="fas fa-lock"></i>
        <input type="password" [(ngModel)]="user.confirmPassword" placeholder="Confirm password" />
      </div>
    </div>

    <button class="btn-register" (click)="register()">Create Account</button>

    <p class="login-link">
      Already have an account? <a routerLink="/login">Sign In</a>
    </p>
  </div>
</div>
