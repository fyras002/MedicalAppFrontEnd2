<div class="register-container">
  <div class="register-card">
    <div class="logo">
      <h1>MedicalApp</h1>
      <p>Create Your Account</p>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>First Name</label>
        <input type="text" [(ngModel)]="user.firstname" placeholder="Enter first name" />
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input type="text" [(ngModel)]="user.lastname" placeholder="Enter last name" />
      </div>
    </div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" [(ngModel)]="user.username" placeholder="Choose a username" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="user.email" placeholder="Enter your email" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="user.password" placeholder="Create password" />
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" [(ngModel)]="user.confirmPassword" placeholder="Confirm password" />
    </div>

    <button class="btn-register" (click)="register()">Create Account</button>

    <p class="login-link">
      Already have an account? <a routerLink="/login">Sign In</a>
    </p>
  </div>
</div>
